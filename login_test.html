<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Login Centro</title>
  <script defer>
    const SUPA_URL = 'https://trbyynbtuzpszdvjivbs.supabase.co';
    const SUPA_ANON = 'sb_publishable_lA_OIFoNVpmh5fmxNwu_1w_f9waqXfj';

    async function fazerLogin() {
      const msg = document.getElementById('msg');
      const usuario = document.getElementById('u').value.trim();
      const senha = document.getElementById('s').value.trim();
      msg.textContent = '⏳ Tentando...';
      try {
        const r = await fetch(
          `${SUPA_URL}/rest/v1/usuario?usuario=eq.${encodeURIComponent(usuario)}&senha=eq.${encodeURIComponent(senha)}&unidade=eq.centro&select=*`,
          { headers: { 'apikey': SUPA_ANON, 'Authorization': 'Bearer ' + SUPA_ANON } }
        );
        const data = await r.json();
        if (data && data.length > 0) {
          msg.textContent = '✅ LOGIN OK! ' + data[0].usuario + ' - ' + data[0].perfil;
          msg.style.color = 'green';
        } else {
          msg.textContent = '❌ Usuário ou senha errados';
          msg.style.color = 'red';
        }
      } catch(e) {
        msg.textContent = '❌ ERRO: ' + e.message;
        msg.style.color = 'red';
      }
    }
  </script>
</head>
<body style="font-family:sans-serif;padding:20px;background:#111;color:#fff;">
  <h2>🔐 Teste Login Centro</h2>
  <br>
  <input id="u" type="text" placeholder="Usuário (ex: Josiel)" style="display:block;width:100%;padding:10px;margin-bottom:10px;font-size:16px;border-radius:8px;border:none;"><br>
  <input id="s" type="password" placeholder="Senha (ex: 2810)" style="display:block;width:100%;padding:10px;margin-bottom:10px;font-size:16px;border-radius:8px;border:none;"><br>
  <button onclick="fazerLogin()" style="width:100%;padding:15px;background:#00e676;color:#000;font-size:18px;font-weight:bold;border:none;border-radius:8px;cursor:pointer;">
    🔓 ENTRAR
  </button>
  <br><br>
  <p id="msg" style="font-size:18px;font-weight:bold;"></p>
</body>
</html>
