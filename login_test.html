<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Teste Login CD</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px;text-align:center">
<h2>Teste Login CD</h2>
<input id="u" type="text" placeholder="usuario" style="display:block;margin:10px auto;padding:10px;width:200px"><br>
<input id="s" type="password" placeholder="senha" style="display:block;margin:10px auto;padding:10px;width:200px"><br>
<button id="btn" style="padding:15px 30px;background:#e53935;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer">ENTRAR</button>
<div id="msg" style="margin-top:20px;font-size:1.2rem"></div>
<script>
var URL = 'https://trbyynbtuzpszdvjivbs.supabase.co';
var KEY = 'sb_publishable_lA_OIFoNVpmh5fmxNwu_1w_f9waqXfj';

document.getElementById('btn').addEventListener('click', function() {
  var u = document.getElementById('u').value.trim();
  var s = document.getElementById('s').value.trim();
  document.getElementById('msg').textContent = 'Tentando...';
  fetch(URL + '/rest/v1/usuario?usuario=eq.' + encodeURIComponent(u) + '&senha=eq.' + encodeURIComponent(s) + '&unidade=eq.cd&select=*', {
    headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data && data.length > 0) {
      document.getElementById('msg').textContent = 'LOGADO! ' + JSON.stringify(data[0]);
      document.getElementById('msg').style.color = '#4caf50';
    } else {
      document.getElementById('msg').textContent = 'Usuario/senha errado';
      document.getElementById('msg').style.color = '#e53935';
    }
  })
  .catch(function(e) {
    document.getElementById('msg').textContent = 'ERRO: ' + e.message;
    document.getElementById('msg').style.color = '#ff9800';
  });
});
</script>
</body>
</html>
