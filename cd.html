<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Estoques Prensadão CD</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Rajdhani', sans-serif; background: #0a0a0a; min-height: 100vh; color: #f0f0f0; letter-spacing: 0.02em; }

    /* LOGIN */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #616161 0%, #37474f 100%);
    }
    .login-box {
      background: #111; border-radius: 4px; padding: 40px 32px; width: 90%; max-width: 380px;
      box-shadow: 0 0 40px #60606044; border: 1px solid #60606033;
    }
    .login-box h1 { font-size: 1.4rem; color: #546e7a; text-align: center; margin-bottom: 6px; }
    .login-box p { font-size: 0.82rem; color: #888; text-align: center; margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 12px 16px; border: 2px solid #333; border-radius: 4px; background: #1a1a1a; color: #f0f0f0;
      font-size: 1rem; margin-bottom: 14px; outline: none; transition: border 0.2s;
    }
    .login-box input:focus { border-color: #546e7a; }
    .login-box button {
      width: 100%; padding: 14px; background: #607d8b; color: #000; border: none;
      border-radius: 4px; font-size: 1.2rem; font-weight: 700; cursor: pointer; font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px;
    }
    .login-box button:hover { background: #37474f; }
    #login-erro { color: #b71c1c; font-size: 0.85rem; text-align: center; margin-top: 10px; display: none; }

    /* APP */
    #app { display: none; }
    .topbar {
      background: #111; color: #607d8b; padding: 12px 16px; border-bottom: 2px solid #607d8b44;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar h1 { font-size: 1rem; font-weight: 700; }
    .topbar span { font-size: 0.78rem; opacity: 0.85; }
    .topbar button { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; }

    .tabs { display: flex; background: #111; border-bottom: 2px solid #222; overflow-x: auto; }
    .tab { padding: 12px 16px; font-size: 0.82rem; font-weight: 700; color: #555; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; letter-spacing: 1px; }
    .tab.active { color: #607d8b; border-bottom-color: #607d8b; }

    .screen { display: none; padding: 16px; max-width: 700px; margin: 0 auto; background: #0a0a0a; }
    .screen.active { display: block; }

    .card { background: #111; border-radius: 4px; padding: 16px; margin-bottom: 12px; border: 1px solid #222; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    .card h3 { font-size: 1rem; color: #607d8b; margin-bottom: 12px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }

    .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
    .btn-red { background: #607d8b; color: #000; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 1.1rem; }
    .btn-green { background: #2e7d32; color: #fff; }
    .btn-blue { background: #37474f; color: #fff; }
    .btn-gray { background: #1a1a1a; color: #888; border: 1px solid #333; }

    input, select { width: 100%; padding: 10px 12px; border: 2px solid #333; border-radius: 4px; font-size: 0.95rem; margin-bottom: 10px; outline: none; background: #1a1a1a; color: #f0f0f0; }
    input:focus, select:focus { border-color: #607d8b; }
    label { font-size: 0.82rem; font-weight: 700; color: #607d8b; display: block; margin-bottom: 4px; letter-spacing: 1px; }

    .produto-item {
      background: #161616; border-radius: 4px; padding: 12px 14px; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
      border-left: 4px solid #333;
    }
    .produto-item.ok { border-left-color: #2e7d32; }
    .produto-item.baixo { border-left-color: #ff9800; }
    .produto-item.zerado { border-left-color: #b71c1c; }
    .produto-nome { font-weight: 700; font-size: 0.9rem; color: #f0f0f0; }
    .produto-cod { font-size: 0.72rem; color: #555; }
    .produto-qty { font-size: 1.1rem; font-weight: 700; color: #607d8b; }
    .produto-qty small { font-size: 0.7rem; color: #888; }

    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 20px; border-radius: 20px;
      font-size: 0.88rem; opacity: 0; transition: opacity 0.3s; z-index: 9999;
      pointer-events: none; max-width: 90%;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: #2e7d32; }
    #toast.error { background: #b71c1c; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 700; }
    .badge-adm { background: #fde8e8; color: #b71c1c; }
    .badge-op { background: #e8f5e9; color: #2e7d32; }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card { background: #161616; border-radius: 4px; padding: 14px; text-align: center; border: 1px solid #222; }
    .stat-num { font-size: 1.6rem; font-weight: 700; color: #607d8b; font-family: 'Bebas Neue', sans-serif; }
    .stat-label { font-size: 0.72rem; color: #555; margin-top: 2px; letter-spacing: 1px; }

    .hist-item { padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
    .hist-item:last-child { border-bottom: none; }
    .hist-tipo { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 0.72rem; font-weight: 700; }
    .hist-contagem { background: #e3f2fd; color: #37474f; }
    .hist-entrada { background: #e8f5e9; color: #2e7d32; }
    .hist-saida { background: #fde8e8; color: #b71c1c; }

    /* Modal movimentação */
    #modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 1000; align-items: flex-end; justify-content: center;
    }
    .modal-box {
      background: #111; border-radius: 4px 4px 0 0; padding: 24px 20px 36px;
      width: 100%; max-width: 480px; border-top: 2px solid #607d8b;
    }
    .modal-box h2 { font-size: 1.3rem; color: #607d8b; margin-bottom: 4px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }
    .modal-box p { font-size: 0.8rem; color: #555; margin-bottom: 12px; }

    @media (min-width: 600px) {
      .tabs { justify-content: center; }
      .tab { padding: 14px 24px; }
    }
  </style>
</head>
