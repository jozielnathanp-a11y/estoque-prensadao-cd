<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Chefão — Prensadão</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Rajdhani', sans-serif; background: #0a0a0a; min-height: 100vh; color: #f0f0f0; letter-spacing: 0.02em; }

    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a0a00 0%, #0a0a0a 100%);
    }
    .login-box {
      background: #111; border-radius: 4px; padding: 40px 32px; width: 90%; max-width: 380px;
      box-shadow: 0 0 40px #f9a82544; border: 1px solid #f9a82533;
    }
    .login-box h1 { font-size: 2.2rem; color: #f9a825; text-align: center; margin-bottom: 6px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 4px; }
    .login-box p { font-size: 0.82rem; color: #888; text-align: center; margin-bottom: 28px; }
    .login-box input { width: 100%; padding: 12px 16px; border: 2px solid #333; border-radius: 4px; background: #1a1a1a; color: #f0f0f0; font-size: 1rem; margin-bottom: 14px; outline: none; }
    .login-box input:focus { border-color: #f9a825; box-shadow: 0 0 8px #f9a82544; }
    .login-box button { width: 100%; padding: 14px; background: #f9a825; color: #000; border: none; border-radius: 4px; font-size: 1.2rem; font-weight: 700; cursor: pointer; font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px; }
    .login-box button:hover { background: #ffca28; }
    #login-erro { color: #b71c1c; font-size: 0.85rem; text-align: center; margin-top: 10px; display: none; }

    #app { display: none; }
    .topbar { background: #111; color: #f9a825; padding: 12px 16px; border-bottom: 2px solid #f9a82544; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar h1 { font-size: 1rem; font-weight: 700; }
    .topbar span { font-size: 0.78rem; opacity: 0.75; }
    .topbar button { background: #1a1a1a; border: 1px solid #333; color: #f9a825; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; }

    .tabs { display: flex; background: #111; border-bottom: 2px solid #222; overflow-x: auto; }
    .tab { padding: 12px 14px; font-size: 0.82rem; font-weight: 700; color: #555; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; letter-spacing: 1px; }
    .tab.active { color: #f9a825; border-bottom-color: #f9a825; }

    .screen { display: none; padding: 16px; max-width: 800px; margin: 0 auto; }
    .screen.active { display: block; }

    .card { background: #111; border-radius: 4px; padding: 16px; margin-bottom: 12px; border: 1px solid #222; }
    .card h3 { font-size: 1rem; color: #f9a825; margin-bottom: 12px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }

    .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
    .btn-gold { background: #f9a825; color: #000; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 1.1rem; }
    .btn-green { background: #2e7d32; color: #fff; }
    .btn-blue { background: #1565c0; color: #fff; }
    .btn-gray { background: #1a1a1a; color: #888; border: 1px solid #333; }
    .btn-red { background: #b71c1c; color: #fff; }

    input, select { width: 100%; padding: 10px 12px; border: 2px solid #333; border-radius: 4px; font-size: 0.95rem; margin-bottom: 10px; outline: none; background: #1a1a1a; color: #f0f0f0; }
    input:focus, select:focus { border-color: #f9a825; box-shadow: 0 0 6px #f9a82533; }
    label { font-size: 0.82rem; font-weight: 700; color: #f9a825; display: block; margin-bottom: 4px; letter-spacing: 1px; }

    .unidade-header { padding: 10px 14px; border-radius: 10px; color: #fff; font-weight: 700; margin: 12px 0 8px; font-size: 0.92rem; }
    .unidade-cd { background: #607d8b; }
    .unidade-centro { background: #1565c0; }
    .unidade-delivery { background: #b71c1c; }

    .prod-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; border-radius: 4px; margin-bottom: 4px; background: #161616; border-left: 4px solid #333; }
    .prod-row.ok { border-left-color: #2e7d32; }
    .prod-row.zerado { border-left-color: #b71c1c; }
    .prod-row.baixo { border-left-color: #ff9800; }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    @media (max-width: 400px) { .stat-grid { grid-template-columns: 1fr 1fr; } }
    .stat-card { background: #161616; border-radius: 4px; padding: 12px; text-align: center; border: 1px solid #222; cursor: pointer; }
    .stat-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
    .stat-num { font-size: 1.1rem; font-weight: 700; }
    .stat-label { font-size: 0.72rem; color: #888; margin-top: 2px; }

    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.88rem; opacity: 0; transition: opacity 0.3s; z-index: 9999; pointer-events: none; max-width: 90%; }
    #toast.show { opacity: 1; }
    #toast.success { background: #2e7d32; }
    #toast.error { background: #b71c1c; }

    /* Modal editar */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1000; align-items: flex-end; justify-content: center; }
    .modal-box { background: #fff; border-radius: 20px 20px 0 0; padding: 24px 20px 36px; width: 100%; max-width: 480px; }
  </style>
</head>
