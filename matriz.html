<script>
var _RESPOSTAS = [{"q": "Como faço uma entrada?", "tags": ["entrada", "entrar", "chegou", "produto chegou", "como lancar", "lançar entrada"], "r": "📥 <b>Como fazer uma ENTRADA:</b><br><br>1️⃣ Vai na aba <b>➕ LANÇAR</b><br>2️⃣ Seleciona <b>ENTRADA</b><br>3️⃣ Escaneia o código de barras ou digita o nome<br>4️⃣ Digita a quantidade em <b>PCT (pacotes)</b><br>5️⃣ Clica <b>ADICIONAR</b><br>6️⃣ Confere a lista de pendentes e clica <b>CONFIRMAR TUDO</b><br><br>⚠️ Não feche o app antes de confirmar!"}, {"q": "O que é contagem?", "tags": ["contagem", "contar", "o que é contagem", "diferença entrada contagem"], "r": "📊 <b>O que é CONTAGEM:</b><br><br>Contagem é quando você <b>confere o que tem fisicamente</b> no estoque e registra no sistema.<br><br>• <b>ENTRADA</b> = chegou produto novo do CD<br>• <b>CONTAGEM</b> = você tá verificando o que tem agora<br><br>Na contagem você digita o total real que existe — não o que chegou. Ex: tem 3kg de frango no freezer → digita 3."}, {"q": "O que é PCT?", "tags": ["pct", "pacote", "o que é pct", "quantidade pct", "o que significa pct"], "r": "📦 <b>O que é PCT (Pacote):</b><br><br>PCT é a unidade de compra do produto.<br><br>Exemplos:<br>• Coca Cola vem em caixa de <b>6 und</b> → 1 PCT = 6<br>• Frango vem em pacote de <b>3kg</b> → 1 PCT = 3kg<br>• Pão vem em pacote de <b>4 und</b> → 1 PCT = 4<br><br>Na entrada você digita <b>quantos pacotes chegaram</b> — o sistema multiplica automaticamente! 😊"}, {"q": "Como funciona a multiplicação?", "tags": ["multiplicação", "multiplicar", "calculo", "cálculo", "conta", "como calcula"], "r": "✖️ <b>Como funciona a multiplicação:</b><br><br>Quando você digita a quantidade na entrada, o sistema multiplica automaticamente pelo PCT do produto.<br><br>Exemplo:<br>• Chegaram <b>2 caixas</b> de Coca Cola (PCT = 6)<br>• Você digita: <b>2</b><br>• O sistema lança: <b>12 unidades</b> no estoque<br><br>Você só precisa contar os pacotes — o sistema faz o resto! 🧮"}, {"q": "Por que preciso colocar quantidade?", "tags": ["porque quantidade", "por que quantidade", "pra que quantidade", "quantidade obrigatorio"], "r": "🔢 <b>Por que informar a quantidade:</b><br><br>A quantidade é essencial pra o sistema saber quanto tem em estoque.<br><br>Sem ela, não dá pra:<br>• Saber quando tá acabando 🔴<br>• Gerar pedido automático 🛒<br>• Controlar o que saiu do CD 📤<br><br>É o coração do sistema — cada lançamento conta!"}, {"q": "Como tiro um relatório?", "tags": ["relatorio", "relatório", "extrato", "historico", "histórico", "como ver", "ver lançamentos"], "r": "📊 <b>Como tirar relatório:</b><br><br><b>Operador:</b><br>→ Aba <b>📋 ROLO</b> — vê tudo que foi lançado no dia. Muda a data pra ver outros dias.<br><br><b>ADM:</b><br>→ Aba <b>📊 EXTRATO</b> — relatório completo com totais por produto. Dá pra exportar pro WhatsApp.<br><br>Filtra por data e tipo (entrada ou contagem)."}, {"q": "O que significa o mínimo e máximo?", "tags": ["minimo", "mínimo", "maximo", "máximo", "min", "max", "limite", "o que é min", "o que é max"], "r": "📏 <b>O que são Mínimo e Máximo:</b><br><br>• <b>Mínimo</b> = quantidade mínima que deve ter em estoque. Abaixo disso fica amarelo ⚠️ no sistema.<br>• <b>Máximo</b> = capacidade máxima de armazenamento.<br><br>Quem define esses valores é o <b>ADM ou o Chefão</b> no sistema.<br><br>Se estiver vermelho 🔴 = zerou. Se estiver amarelo 🟡 = tá no limite e precisa pedir mais!"}, {"q": "Como sei meu mínimo e máximo?", "tags": ["como ver min", "como ver max", "ver minimo", "ver maximo", "onde fica minimo"], "r": "📏 <b>Como ver o Mínimo e Máximo:</b><br><br>Na aba <b>📦 TRAMPO GERAL</b>, cada produto mostra:<br>• O estoque atual<br>• A cor indica se está OK, no limite ou zerado<br><br>Os valores de mín/máx são configurados pelo ADM.<br><br>Se quiser saber os valores exatos, <b>chama o Josiel</b> pelo botão abaixo! 👇"}, {"q": "Produto não aparece ou código errado", "tags": ["produto não aparece", "nao aparece", "código errado", "codigo errado", "produto errado", "não acha", "nao acha", "produto sumiu"], "r": "🔍 <b>Produto não aparece / código errado:</b><br><br>Isso pode acontecer quando:<br>• O produto ainda não foi cadastrado no sistema<br>• O código de barras foi alterado pelo fornecedor<br>• O produto foi cadastrado com nome diferente<br><br>✅ Tenta buscar pelo <b>nome</b> em vez do código.<br><br>Se não achar mesmo assim, <b>chama o Josiel</b> pelo botão abaixo pra cadastrar! 👇"}, {"q": "Esqueci a senha", "tags": ["senha", "esqueci senha", "nao lembro senha", "não lembro senha", "senha errada", "não consigo entrar"], "r": "🔑 <b>Esqueceu a senha:</b><br><br>Senhas são gerenciadas pelo Josiel.<br><br>Manda mensagem pra ele pelo botão abaixo que ele resolve rapidinho! 👇"}, {"q": "O que significa vermelho ou amarelo?", "tags": ["vermelho", "amarelo", "verde", "cor", "cores", "o que significa cor", "por que vermelho", "por que amarelo"], "r": "🎨 <b>O que significam as cores:</b><br><br>🔴 <b>Vermelho</b> = estoque ZERADO. Precisa fazer entrada urgente!<br>🟡 <b>Amarelo</b> = estoque abaixo do mínimo. Tá acabando, faz o pedido!<br>🟢 <b>Verde</b> = tá suave, estoque OK.<br><br>Essas cores aparecem na aba <b>📦 TRAMPO GERAL</b>."}, {"q": "Como escanear o código?", "tags": ["escanear", "scanner", "câmera", "camera", "como escanear", "codigo barras", "código de barras"], "r": "📷 <b>Como escanear o código de barras:</b><br><br>1️⃣ Na aba <b>➕ LANÇAR</b>, clica no campo de código<br>2️⃣ Se o celular tiver câmera disponível, aparece opção de escanear<br>3️⃣ Aponta pro código de barras do produto<br>4️⃣ O sistema preenche automaticamente!<br><br>💡 Dica: deixa o código bem iluminado pra leitura ser mais rápida."}, {"q": "Como sei o que vai chegar de produto?", "tags": ["vai chegar", "o que vai chegar", "produto vai chegar", "pedido", "precisao", "precisão", "o que pedir", "o que precisa", "falta produto", "o que falta"], "r": "🛒 <b>Como saber o que vai chegar:</b><br><br>O sistema tem a aba <b>🛒 PRECISÃO</b> (só no Chefão e ADM) que mostra automaticamente o que precisa ser pedido.<br><br>Ela calcula com base no estoque mínimo de cada produto:<br>• Se tiver abaixo do mínimo → aparece na lista de pedido<br>• Mostra a quantidade sugerida pra pedir<br><br>Pra operadores: quando um produto ficar <b>🔴 vermelho ou 🟡 amarelo</b> na aba TRAMPO GERAL, é sinal que tá chegando pedido em breve — fala com o Josiel ou ADM!"}];
var _chatAberto = false;

var _SUGESTOES = [
  "O que é entrada?",
  "O que é contagem?",
  "O que é PCT?",
  "Como funciona a multiplicação?",
  "Como tiro um relatório?",
  "O que significa mínimo e máximo?",
  "Como sei o que vai chegar de produto?",
  "Produto não aparece",
  "O que significa vermelho ou amarelo?",
];

function toggleChat() {
  _chatAberto = !_chatAberto;
  document.getElementById('chat-box').style.display = _chatAberto ? 'flex' : 'none';
  document.getElementById('chat-box').style.flexDirection = 'column';
  if (_chatAberto) {
    renderSugestoes();
    setTimeout(function() { document.getElementById('chat-input').focus(); }, 200);
  }
}

function renderSugestoes() {
  var el = document.getElementById('chat-sugestoes');
  el.innerHTML = _SUGESTOES.map(function(s) {
    return '<button class="chat-sug" onclick="responderSugestao(' + JSON.stringify(s) + ')">' + s + '</button>';
  }).join('');
}

function adicionarMsg(texto, tipo) {
  var msgs = document.getElementById('chat-msgs');
  var div = document.createElement('div');
  div.className = tipo === 'user' ? 'chat-user-msg' : 'chat-bot-msg';
  div.innerHTML = texto;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function responderSugestao(pergunta) {
  document.getElementById('chat-sugestoes').innerHTML = '';
  adicionarMsg(pergunta, 'user');
  setTimeout(function() { buscarResposta(pergunta); }, 300);
}

function enviarChat() {
  var input = document.getElementById('chat-input');
  var texto = input.value.trim();
  if (!texto) return;
  input.value = '';
  document.getElementById('chat-sugestoes').innerHTML = '';
  adicionarMsg(texto, 'user');
  setTimeout(function() { buscarResposta(texto); }, 300);
}

function buscarResposta(pergunta) {
  var p = pergunta.toLowerCase();
  var melhor = null;
  var melhorScore = 0;

  for (var i = 0; i < _RESPOSTAS.length; i++) {
    var r = _RESPOSTAS[i];
    var score = 0;
    for (var j = 0; j < r.tags.length; j++) {
      if (p.includes(r.tags[j])) {
        score += r.tags[j].length; // prioriza tags mais longas/específicas
      }
    }
    if (score > melhorScore) {
      melhorScore = score;
      melhor = r;
    }
  }

  if (melhor && melhorScore > 0) {
    adicionarMsg(melhor.r, 'bot');
    // Oferecer mais opções
    setTimeout(function() {
      adicionarMsg('Isso ajudou? Tem mais alguma dúvida? 😊<br><br><button class="chat-sug" onclick="mostrarTodasOpcoes()" style="margin-top:4px;">Ver outras dúvidas</button>', 'bot');
    }, 600);
  } else {
    // Não encontrou resposta
    var msgWpp = 'Oi Josiel, tenho uma duvida: ' + pergunta;
    var wppUrl = 'https://wa.me/5542988819420?text=' + encodeURIComponent(msgWpp);
    adicionarMsg(
      'Hmm, essa eu não sei responder não, mano! 🤔<br><br>Mas o Josiel resolve — clica aí pra chamar ele diretamente:<br><br><a href="' + wppUrl + '" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:#0a1f0a;border:1px solid #2e7d32;color:#4caf50;border-radius:8px;padding:8px 12px;text-decoration:none;font-size:0.82rem;font-weight:700;margin-top:4px;">💬 Chamar Josiel no WhatsApp</a>',
      'bot'
    );
  }
}

function mostrarTodasOpcoes() {
  adicionarMsg('Escolhe aí o que você quer saber:', 'bot');
  var msgs = document.getElementById('chat-msgs');
  var div = document.createElement('div');
  div.style.cssText = 'display:flex;flex-direction:column;gap:6px;align-self:stretch;';
  div.innerHTML = _SUGESTOES.map(function(s) {
    return '<button class="chat-sug" onclick="responderSugestao(' + JSON.stringify(s) + ')">' + s + '</button>';
  }).join('');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
</script>

    <!-- Tipo -->
    <label style="font-size:0.78rem;color:#888;font-weight:700;letter-spacing:1px;">TIPO</label>
    <div style="display:flex;gap:8px;margin:8px 0 16px;">
      <button id="fb-tipo-erro" onclick="setFbTipo('erro')" style="flex:1;background:#2a0a0a;border:2px solid #b71c1c;color:#ef5350;border-radius:10px;padding:9px;cursor:pointer;font-weight:700;font-size:0.82rem;">🐛 Erro</button>
      <button id="fb-tipo-sugestao" onclick="setFbTipo('sugestao')" style="flex:1;background:#0a2a0a;border:1px solid #333;color:#888;border-radius:10px;padding:9px;cursor:pointer;font-weight:700;font-size:0.82rem;">💡 Sugestão</button>
      <button id="fb-tipo-elogio" onclick="setFbTipo('elogio')" style="flex:1;background:#1a1200;border:1px solid #333;color:#888;border-radius:10px;padding:9px;cursor:pointer;font-weight:700;font-size:0.82rem;">⭐ Elogio</button>
    </div>

    <!-- Mensagem -->
    <label style="font-size:0.78rem;color:#888;font-weight:700;letter-spacing:1px;">MENSAGEM</label>
    <textarea id="fb-texto" placeholder="Descreve aqui o que aconteceu ou a sua ideia..." style="width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;border-radius:10px;padding:12px;font-size:0.88rem;line-height:1.5;resize:none;height:110px;margin-top:8px;box-sizing:border-box;"></textarea>

    <!-- Quem é -->
    <label style="font-size:0.78rem;color:#888;font-weight:700;letter-spacing:1px;margin-top:12px;display:block;">SEU NOME <span style="color:#444;font-weight:400;">(opcional)</span></label>
    <input id="fb-nome" type="text" placeholder="Ex: Gabriel, Ruan..." style="width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;border-radius:10px;padding:10px 12px;font-size:0.85rem;margin-top:8px;box-sizing:border-box;" />

    <button onclick="enviarFeedback()" style="width:100%;margin-top:16px;background:#7c4dff;border:none;color:#fff;border-radius:12px;padding:13px;font-weight:700;font-size:0.95rem;cursor:pointer;letter-spacing:1px;">📤 ENVIAR FEEDBACK</button>
    <div id="fb-status" style="text-align:center;font-size:0.8rem;color:#4caf50;margin-top:8px;min-height:18px;"></div>
  </div>
</div>

<script>
var _fbTipo = 'erro';

function toggleFeedback() {
  var p = document.getElementById('feedback-panel');
  p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
  p.style.alignItems = 'center';
  p.style.justifyContent = 'center';
  if (p.style.display === 'flex') setFbTipo('erro');
}

function setFbTipo(tipo) {
  _fbTipo = tipo;
  var estilos = {
    'erro':     { bg: '#2a0a0a', border: '2px solid #b71c1c', color: '#ef5350' },
    'sugestao': { bg: '#0a1a2a', border: '2px solid #1565c0', color: '#42a5f5' },
    'elogio':   { bg: '#1a1200', border: '2px solid #f9a825', color: '#f9a825' },
  };
  ['erro','sugestao','elogio'].forEach(function(t) {
    var btn = document.getElementById('fb-tipo-' + t);
    var s = estilos[t];
    if (t === tipo) {
      btn.style.background = s.bg;
      btn.style.border = s.border;
      btn.style.color = s.color;
    } else {
      btn.style.background = '#111';
      btn.style.border = '1px solid #333';
      btn.style.color = '#555';
    }
  });
}

function enviarFeedback() {
  var texto = document.getElementById('fb-texto').value.trim();
  var nome = document.getElementById('fb-nome').value.trim() || 'Anônimo';
  var status = document.getElementById('fb-status');

  if (!texto) {
    status.style.color = '#ef5350';
    status.textContent = '⚠️ Escreve a mensagem primeiro!';
    return;
  }

  var tipoLabel = _fbTipo === 'erro' ? '🐛 ERRO' : _fbTipo === 'sugestao' ? '💡 SUGESTÃO' : '⭐ ELOGIO';
  var msg = tipoLabel + ' — Sistema Chefão\n\nDe: ' + nome + '\n\n' + texto;
  var url = 'https://wa.me/5542988819420?text=' + encodeURIComponent(msg);

  window.open(url, '_blank');

  status.style.color = '#4caf50';
  status.textContent = '✅ Abrindo WhatsApp...';
  document.getElementById('fb-texto').value = '';
  document.getElementById('fb-nome').value = '';

  setTimeout(function() {
    toggleFeedback();
    status.textContent = '';
  }, 2000);
}
</script>
</body>
</html>
